<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Urduliz Maze Adventure</title>
  <link rel="stylesheet" href="src/render/styles.css">
</head>
<body>
  <div id="app">
    <div id="menu" class="menu">
      <h1>Urduliz Maze Adventure</h1>
      
      <div class="menu-group">
        <label for="seed">Seed:</label>
        <input type="text" id="seed" placeholder="Random if empty">
        <button id="paste-seed">Paste</button>
      </div>

      <div class="menu-row">
        <div class="menu-group">
          <label for="width">Width:</label>
          <input type="number" id="width" min="15" max="50" value="25">
        </div>
        <div class="menu-group">
          <label for="height">Height:</label>
          <input type="number" id="height" min="15" max="50" value="25">
        </div>
      </div>

      <button id="start-btn" class="start-button">Play</button>
    </div>

    <div id="game-container" class="game-container" style="display: none;">
      <div id="hud" class="hud">
        <div id="seed-display">Seed: <span id="seed-value">0</span></div>
        <button id="copy-seed">Copy</button>
        <button id="hint-btn">Path Hint</button>
        <button id="back-btn">Back to Menu</button>
      </div>
      <canvas id="gameCanvas" width="800" height="600"></canvas>
    </div>
  </div>

  <script src="dist/main.js"></script>
</body>
</html>
